<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 基础 - 0418</title>
</head>
<body>
    <h1>JavaScript 基础知识练习</h1>

    <script>
        // ============================
        // 一、变量的定义
        // ============================

        // 1. var 关键字（函数作用域，可重复声明）
        var name = "张三";
        var age = 20;
        console.log("var 声明：", name, age);

        // var 可以重复声明，不会报错
        var name = "李四";
        console.log("var 重复声明后：", name);

        // 2. let 关键字（块级作用域，不可重复声明）
        let city = "北京";
        console.log("let 声明：", city);

        // let city = "上海"; // 报错：Identifier 'city' has already been declared

        // 3. const 关键字（块级作用域，必须赋初值，不可重新赋值）
        const PI = 3.14159;
        console.log("const 声明：", PI);

        // PI = 3.14; // 报错：Assignment to constant variable

        // 总结：优先使用 const，需要修改时用 let，避免使用 var


        // ============================
        // 二、变量类型
        // ============================

        // 1. Number 数字类型
        let intNum = 10;           // 整数
        let floatNum = 3.14;       // 浮点数
        let negativeNum = -5;      // 负数
        console.log("Number 类型：", intNum, floatNum, negativeNum);

        // 2. String 字符串类型
        let str1 = "你好";          // 双引号
        let str2 = '世界';          // 单引号
        let str3 = `结果是${intNum}`; // 模板字符串（反引号）
        console.log("String 类型：", str1, str2, str3);

        // 3. Boolean 布尔类型
        let isStudent = true;
        let isGraduated = false;
        console.log("Boolean 类型：", isStudent, isGraduated);

        // 4. undefined 未定义类型
        let notAssigned;
        console.log("undefined 类型：", notAssigned);

        // 5. null 空类型
        let emptyValue = null;
        console.log("null 类型：", emptyValue);

        // 6. typeof 运算符查看类型
        console.log("typeof 10:", typeof intNum);         // "number"
        console.log("typeof '你好':", typeof str1);       // "string"
        console.log("typeof true:", typeof isStudent);    // "boolean"
        console.log("typeof undefined:", typeof notAssigned); // "undefined"
        console.log("typeof null:", typeof emptyValue);   // "object"（这是JS的历史bug）


        // ============================
        // 三、表达式
        // ============================

        // 1. 算术表达式
        let a = 10, b = 3;
        console.log("加法：", a + b);    // 13
        console.log("减法：", a - b);    // 7
        console.log("乘法：", a * b);    // 30
        console.log("除法：", a / b);    // 3.333...
        console.log("取余：", a % b);    // 1
        console.log("幂运算：", a ** b); // 1000

        // 2. 比较表达式
        console.log("10 > 3:", a > b);      // true
        console.log("10 < 3:", a < b);      // false
        console.log("10 >= 10:", a >= 10);  // true
        console.log("10 == '10':", a == '10');   // true（只比较值，会类型转换）
        console.log("10 === '10':", a === '10'); // false（比较值和类型，推荐使用）

        // 3. 逻辑表达式
        let x = true, y = false;
        console.log("true && false:", x && y);  // false（与：都为真才为真）
        console.log("true || false:", x || y);  // true（或：有一个为真就为真）
        console.log("!true:", !x);               // false（非：取反）

        // 4. 赋值表达式
        let num = 10;
        num += 5;  // 等价于 num = num + 5
        console.log("num += 5:", num);  // 15
        num -= 3;  // 等价于 num = num - 3
        console.log("num -= 3:", num);  // 12
        num *= 2;  // 等价于 num = num * 2
        console.log("num *= 2:", num);  // 24


        // ============================
        // 四、流程控制
        // ============================

        // 1. if...else 条件语句
        let score = 85;
        if (score >= 90) {
            console.log("优秀");
        } else if (score >= 80) {
            console.log("良好");  // 输出这个
        } else if (score >= 60) {
            console.log("及格");
        } else {
            console.log("不及格");
        }

        // 2. switch 语句
        let day = "周三";
        switch (day) {
            case "周一":
                console.log("今天是周一");
                break;
            case "周二":
                console.log("今天是周二");
                break;
            case "周三":
                console.log("今天是周三");  // 输出这个
                break;
            default:
                console.log("其他日子");
        }

        // 3. for 循环
        console.log("for 循环输出 1~5：");
        for (let i = 1; i <= 5; i++) {
            console.log(i);  // 输出 1 2 3 4 5
        }

        // 4. while 循环
        console.log("while 循环输出 1~3：");
        let count = 1;
        while (count <= 3) {
            console.log(count);  // 输出 1 2 3
            count++;
        }

        // 5. do...while 循环（至少执行一次）
        console.log("do...while 循环：");
        let n = 1;
        do {
            console.log(n);  // 输出 1
            n++;
        } while (n < 1);

        // 6. break 和 continue
        console.log("break 示例：遇到3就跳出循环");
        for (let i = 1; i <= 5; i++) {
            if (i === 3) break;
            console.log(i);  // 输出 1 2
        }

        console.log("continue 示例：跳过3继续循环");
        for (let i = 1; i <= 5; i++) {
            if (i === 3) continue;
            console.log(i);  // 输出 1 2 4 5
        }


        // ============================
        // 五、函数
        // ============================

        // 1. 函数声明
        function greet(name) {
            return "你好，" + name + "！";
        }
        console.log(greet("小明"));  // "你好，小明！"

        // 2. 带默认参数的函数
        function sayHello(name = "同学") {
            return "你好，" + name + "！";
        }
        console.log(sayHello());       // "你好，同学！"
        console.log(sayHello("小红")); // "你好，小红！"

        // 3. 函数表达式（将函数赋值给变量）
        let add = function(x, y) {
            return x + y;
        };
        console.log("函数表达式 add(3, 5):", add(3, 5));  // 8

        // 4. 箭头函数（ES6 简写）
        let multiply = (x, y) => x * y;
        console.log("箭头函数 multiply(4, 6):", multiply(4, 6));  // 24

        // 箭头函数 - 多行写法
        let getArea = (width, height) => {
            let area = width * height;
            return area;
        };
        console.log("箭头函数 getArea(5, 8):", getArea(5, 8));  // 40

        // 5. 函数作为参数传递（回调函数）
        function calculate(a, b, operation) {
            return operation(a, b);
        }
        console.log("加法：", calculate(10, 5, (x, y) => x + y));   // 15
        console.log("减法：", calculate(10, 5, (x, y) => x - y));   // 5

    </script>
</body>
</html>
